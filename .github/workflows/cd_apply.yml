name: 'CD Pipeline: Infra & App Deploy'

on:
  push:
    branches:
      - dev

# Required permissions for WIF authentication
permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-dev-environment
  cancel-in-progress: false

jobs:
  terraform_apply:
    name: 'terraform_apply.yml'
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./infrastructure/environments/dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_DEV_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEV_CICD_SA }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve


  deploy_alerting:
    name: 'deploy_alerting.yml'
    needs: terraform_apply
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Deploy Alerting
        run: |
          echo "Infrastructure is ready!"
          echo "Deploying alerting scripts and configurations here..."
          # Add your actual deployment scripts later

  deploy_nlp:
    name: 'deploy_nlp.yml'
    needs: terraform_apply
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Deploy NLP App
        run: |
          echo "Deploying the NLP Cloud Run service..."
          # Add your Docker build/push and Cloud Run deploy commands later