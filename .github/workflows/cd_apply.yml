name: 'CD Pipeline: Infra & App Deploy'

on:
  push:
    branches:
      - dev

# Required permissions for WIF authentication
permissions:
  contents: read
  id-token: write

# CRITICAL: This concurrency block prevents the "Stale Plan" race condition we discussed.
# It ensures only one deployment to the dev environment can happen at a time.
concurrency:
  group: deploy-dev-environment
  cancel-in-progress: false

jobs:
  # ==========================================
  # PHASE 1: infra CD
  # ==========================================
  terraform_apply:
    name: 'terraform_apply.yml'
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./infrastructure/environments/dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          # Pulling securely from GitHub Secrets!
          workload_identity_provider: ${{ secrets.GCP_DEV_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEV_CICD_SA }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      # Since the PR was approved, we apply the merged code automatically
      - name: Terraform Apply
        run: terraform apply -auto-approve

  # ==========================================
  # PHASE 2: aux scripts layer + application CD
  # ==========================================
  deploy_alerting:
    name: 'deploy_alerting.yml'
    needs: terraform_apply # This enforces the "CD OK?" check from your diagram
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Deploy Alerting
        run: |
          echo "Infrastructure is ready!"
          echo "Deploying alerting scripts and configurations here..."
          # Add your actual deployment scripts later

  deploy_nlp:
    name: 'deploy_nlp.yml'
    needs: terraform_apply # Also waits for Terraform to finish successfully
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Deploy NLP App
        run: |
          echo "Deploying the NLP Cloud Run service..."
          # Add your Docker build/push and Cloud Run deploy commands later