<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Monthly Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 30px; background-color: #f9f9f9; font-family: Arial, sans-serif; color: #333;">

    <div style="max-width: 700px; margin: 0 auto; background-color: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
        <div style="margin-bottom: 30px; text-align: center;">
            <img
                src="https://i.ibb.co/q3Y484t3/behavio7.png"
                alt="Company Logo"
                style="max-width: 300px; width: 100%; height: auto"
            >
        </div>
        <!-- Header -->
        <h2 style="color: #ffffff; font-size: 24px; margin: 0 0 20px 0; padding: 20px; border-radius: 6px; background-color: #0C66EE;">{{name}}</h2>
        <p style="color: #555; font-size: 16px; margin-bottom: 30px; line-height: 1.6;">
            Choose which part of the report you want to view.
        </p>

        <!-- Alert blocks -->
        {% for view in views %}
            <div style="background-color: #f1f3f5; padding: 20px; border-radius: 6px; margin-bottom: 25px;">
                <h3 style="color: #222; font-size: 18px; margin: 0 0 10px;">{{ view.name }}</h3>
                <p style="color: #555; font-size: 15px; line-height: 1.6; margin: 0 0 10px;">{{ view.alert_message }}</p>
                <div style="text-align: right; margin-top: 10px;">
                    <a href="{{ view.link }}" style="display: inline-block; background-color: #28a745; color: #ffffff; padding: 10px 18px; font-size: 14px; text-decoration: none; border-radius: 4px; font-weight: bold;">
                        🔍 View
                    </a>
                </div>
            </div>
        {% endfor %}

        <!-- Footer -->
        <p style="font-size: 12px; color: #aaa; margin-top: 50px; text-align: center;">
            This email was generated automatically by the alert system.<br>
            Need help? Contact us at
            <a href="mailto:email.alerttestbot@gmail.com" style="color: #888; text-decoration: underline;">email.alerttestbot@gmail.com</a>.
        </p>

    </div>

</body>
</html>
