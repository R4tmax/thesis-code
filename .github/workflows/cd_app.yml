name: 'App CD'

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

jobs:
  deploy_nlp:
    name: 'Deploy NLP App (${{ inputs.environment }})'
    runs-on: self-hosted
    steps:
      - run: echo "Deploying NLP App to ${{ inputs.environment }}..."

  deploy_alerting:
    name: 'Deploy Alerting (${{ inputs.environment }})'
    runs-on: self-hosted
    steps:
      - run: echo "Deploying Alerting to ${{ inputs.environment }}..."