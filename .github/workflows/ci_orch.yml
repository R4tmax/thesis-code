name: 'CI Orchestrator'

on:
  pull_request:
    branches:
      - dev
      - prod
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  app_ci:
    uses: ./.github/workflows/app-ci-module.yml

  tf_ci_dev:
    if: github.base_ref == 'dev'
    uses: ./.github/workflows/tf-ci-module.yml
    with:
      environment: 'dev'
      working_directory: './infrastructure/environments/dev'
    secrets:
      WIF_PROVIDER: ${{ secrets.GCP_DEV_WIF_PROVIDER }}
      CICD_SA: ${{ secrets.GCP_DEV_CICD_SA }}

  tf_ci_prod:
    if: github.base_ref == 'prod'
    uses: ./.github/workflows/tf-ci-module.yml
    with:
      environment: 'prod'
      working_directory: './infrastructure/environments/prod'
    secrets:
      WIF_PROVIDER: ${{ secrets.GCP_PROD_WIF_PROVIDER }}
      CICD_SA: ${{ secrets.GCP_PROD_CICD_SA }}

  # 4. Final Aggregation and PR Comment
  post_plan_comment:
    needs: [app_ci, tf_ci_dev, tf_ci_prod]
    # 'always()' ensures it runs even if one of the infra jobs was skipped due to the 'if' condition
    if: always() && (needs.tf_ci_dev.result == 'success' || needs.tf_ci_prod.result == 'success')
    runs-on: self-hosted
    steps:
      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '**Terraform Plan generated successfully.** Please review the execution plan in the actions log or artifact.'
            })