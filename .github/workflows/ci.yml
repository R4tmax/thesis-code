name: 'CI and Plan'

on:
  pull_request:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  validate_tf:
    name: 'validate_tf.yml'
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./infrastructure/environments/dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check
      - run: terraform init -backend=false
      - run: terraform validate

  validate_source_code:
    name: 'validate_source_code.yml'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: echo "Linting application code..."

  aggregate_ci_out:
    name: 'aggregate_CI_out.yml'
    needs: [validate_tf, validate_source_code]
    runs-on: self-hosted
    steps:
      - run: echo "All CI checks passed! Proceeding to infrastructure plan."

  build_plan:
    name: 'build_plan.yml'
    needs: aggregate_ci_out
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ./infrastructure/environments/dev
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_DEV_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEV_CICD_SA }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan

      - name: Upload TF Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-artifact
          path: ./infrastructure/environments/dev/tfplan

      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '**Terraform Plan generated successfully.** Please review the execution plan in the actions log or artifact.'
            })